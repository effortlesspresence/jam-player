<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-Bus Bus Configuration 1.0//EN"
  "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Allow root to own the JAM BLE State Manager service -->
  <policy user="root">
    <allow own="com.jam.BLEStateManager"/>
    <allow send_destination="com.jam.BLEStateManager"/>
    <allow receive_sender="com.jam.BLEStateManager"/>
  </policy>

  <!-- Allow anyone to send to and receive from this service -->
  <policy context="default">
    <allow send_destination="com.jam.BLEStateManager"/>
    <allow receive_sender="com.jam.BLEStateManager"/>
  </policy>
</busconfig>
