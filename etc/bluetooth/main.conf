# JAM Player BlueZ Configuration
# This file configures Bluetooth for BLE provisioning without pairing popups

[General]
# Enable Just Works pairing (no PIN required)
JustWorksRepairing = always

# Don't require pairing for LE connections
# This is critical for BLE GATT without popups
Privacy = off

# Use the NoInputNoOutput capability for the default agent
# This means pairing will use "JustWorks" without any UI
Class = 0x000000

# Disable BR/EDR (Classic Bluetooth) since we only use BLE
ControllerMode = le

# Allow connections without authentication
# Our GATT characteristics don't require encryption
DiscoverableTimeout = 0

[LE]
# Minimum and maximum connection intervals
MinConnectionInterval = 6
MaxConnectionInterval = 40

# Connection latency
ConnectionLatency = 0

[GATT]
# Don't require encryption for GATT operations
# Our provisioning service is designed to work without pairing
# Security is handled at the application layer
