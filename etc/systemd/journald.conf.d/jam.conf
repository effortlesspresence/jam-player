# JAM Player 2.0 - systemd journald configuration
#
# Installed to /etc/systemd/journald.conf.d/jam.conf by jam-update.service.
#
# Caps the persistent journal to 1 GB on the device. Non-JAM systemd units
# (kernel, bluez, NetworkManager, etc.) also log into this namespace, but
# on a JAM Player device their combined output is negligible compared to
# the jam-*.service units, so this effectively caps JAM logs at ~1 GB.
#
# Rationale: without an explicit cap, journald falls back to the upstream
# default (~10% of filesystem capacity, up to 4 GB), which on our 16 GB
# SD cards is large enough that runaway logging can crowd out the
# migration script's temporary disk headroom and block updates. We saw
# exactly this failure mode during the JAM 1.0 -> 2.0 migration wave:
# stale 3.8 GB log files on devices blocked the install.
#
# A restart of systemd-journald is required for changes to take effect.
# jam-update.service handles that when it installs or updates this file.

[Journal]
# Keep logs on disk (not just in memory). We want persistence across
# reboots so operators can investigate issues that happened before the
# 3 AM reboot cycle.
Storage=persistent

# Hard cap for the persistent journal directory (/var/log/journal/...).
SystemMaxUse=1G

# Journald will aggressively vacuum old entries if free disk falls below
# this threshold, even if SystemMaxUse hasn't been hit yet. Protects the
# migration script and content downloads from ever being blocked by log
# volume.
SystemKeepFree=500M

# Individual journal file size before rotation. Larger files mean fewer
# rotations but bigger single-file reads for journalctl.
SystemMaxFileSize=64M

# Purge entries older than this regardless of size. Two weeks is long
# enough to investigate any incident we'd reasonably be notified about.
MaxRetentionSec=14day

# Rate limit per-service output: at most 5000 messages per 30s window
# before journald starts dropping messages from that service. Prevents
# a single runaway logger from burning the journal budget. Our services
# should never come near this; it's strictly a backstop.
RateLimitIntervalSec=30s
RateLimitBurst=5000
