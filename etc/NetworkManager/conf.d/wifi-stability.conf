# JAM Player WiFi Stability Configuration
# Settings to improve WiFi connection reliability

[connection]
# Unlimited authentication retries - never give up trying to connect
# 0 = infinite retries (default is usually 3)
connection.auth-retries = 0

[device]
# Disable MAC address randomization during WiFi scans
# Some routers work better with consistent MAC addresses
# IoT devices don't need privacy protection from MAC randomization
wifi.scan-rand-mac-address = no
