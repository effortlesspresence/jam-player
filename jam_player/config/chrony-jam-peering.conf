# JAM Player Chrony Peering Configuration
# This file is included by chrony.conf to enable peer-to-peer clock sync
# when internet connectivity is lost.

# Allow other JAM Players on the local network to query our time
# This enables peer mode when NTP servers are unreachable
allow 10.0.0.0/8
allow 172.16.0.0/12
allow 192.168.0.0/16

# When we lose all NTP sources, allow this device to serve time
# based on its hardware clock. Stratum 10 indicates low accuracy
# but is good enough for syncing playback across JAM Players.
local stratum 10

# Log peer activity for debugging
log measurements statistics tracking
